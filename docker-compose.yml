version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nest_prisma_pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: nest_api
    restart: always
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      PORT: 3003
      # Écrase DATABASE_URL du .env pour pointer vers le service postgres (pas localhost)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestdb
      BETTER_AUTH_URL: http://localhost:3003
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
